name: daily-apply

on:
  schedule:
    - cron: '0 8 * * 1-5'   # 08:00 UTC, Mon–Fri
  workflow_dispatch: {}

permissions:
  contents: write             # so we can commit state.json back

concurrency:
  group: daily-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Brevo SMTP relay — set these as repo secrets.
      # SMTP_USER = your Brevo login email (must be a verified sender)
      # SMTP_PASS = SMTP key from Brevo dashboard → SMTP & API → SMTP
      SMTP_HOST: smtp-relay.brevo.com
      SMTP_PORT: '587'
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      DIGEST_TO: ${{ secrets.DIGEST_TO }}
      PYTHONUNBUFFERED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Materialise personal data from secrets
        env:
          CV_CONTENT_B64: ${{ secrets.CV_CONTENT_B64 }}
          PROFILE_B64: ${{ secrets.PROFILE_B64 }}
        run: |
          if [ -z "$CV_CONTENT_B64" ] || [ -z "$PROFILE_B64" ]; then
            echo "CV_CONTENT_B64 and PROFILE_B64 secrets are required." >&2
            exit 1
          fi
          echo "$CV_CONTENT_B64" | base64 -d > cv_content.py
          echo "$PROFILE_B64" | base64 -d > config/profile.yaml

      - name: Build base CV PDF
        run: python build_cv.py

      - name: Run bot
        run: python -m src.main

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}
          path: |
            screenshots/
            statements/
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit state changes
        if: always()
        run: |
          git config user.name "application-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update state after run ${{ github.run_id }}"
            git push
          fi
