name: daily-apply

on:
  schedule:
    - cron: '0 8 * * 1-5'   # 08:00 UTC, Mon–Fri
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Override dry_run for this manual run"
        type: choice
        default: from-config
        options:
          - from-config
          - 'true'
          - 'false'

permissions:
  contents: write             # so we can commit state.json back

concurrency:
  group: daily-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # Max-plan OAuth token from `claude setup-token`. The Claude Code CLI
      # and the claude-agent-sdk subprocess both read this from env.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # Brevo SMTP relay — set these as repo secrets.
      # SMTP_USER = your Brevo login email (must be a verified sender)
      # SMTP_PASS = SMTP key from Brevo dashboard → SMTP & API → SMTP
      SMTP_HOST: smtp-relay.brevo.com
      SMTP_PORT: '587'
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      DIGEST_TO: ${{ secrets.DIGEST_TO }}
      DRY_RUN_OVERRIDE: ${{ inputs.dry_run }}   # empty on scheduled cron runs
      PYTHONUNBUFFERED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Materialise personal data from secrets
        env:
          CV_CONTENT_B64: ${{ secrets.CV_CONTENT_B64 }}
          PROFILE_B64: ${{ secrets.PROFILE_B64 }}
        run: |
          if [ -z "$CV_CONTENT_B64" ] || [ -z "$PROFILE_B64" ]; then
            echo "CV_CONTENT_B64 and PROFILE_B64 secrets are required." >&2
            exit 1
          fi
          echo "$CV_CONTENT_B64" | base64 -d > cv_content.py
          echo "$PROFILE_B64" | base64 -d > config/profile.yaml

      - name: Build base CV PDF
        run: python build_cv.py

      - name: Run bot
        run: python -m src.main

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}
          path: |
            screenshots/
            statements/
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit state changes
        if: always()
        run: |
          git config user.name "application-bot"
          git config user.email "bot@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME:-main}"
          # Reconcile with any pushes that landed while the bot was running,
          # so our push is fast-forward. --autostash keeps state.json safe
          # across the rebase. We never fail the job on a push failure —
          # losing one run's state.json update only causes some duplicate
          # work next time, not a hard error.
          git pull --rebase --autostash origin "$BRANCH" || true
          git add state.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update state after run ${{ github.run_id }}"
            git push origin "$BRANCH" || echo "::warning::state.json push failed; will retry next run"
          fi
