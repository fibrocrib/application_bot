# Edit this file to control what the bot applies to. Commit and the next
# scheduled run picks up the changes.

cv_path: cv.pdf            # PDF in repo root
daily_cap: 10              # max applications per run
fit_threshold: 0.6         # 0..1, below this we skip
per_query_limit: 15        # lead cap per query per source (was 40 — was causing 362 leads and 90-min timeout)
dry_run: true              # fill every field but DON'T click submit; flip to false when you trust it

# Where you live now. Used by the relocation evaluator to decide whether
# a non-local role is worth applying to.
base_location: "London, UK"

# Current salary floor. Roles that publish a max salary below this are
# skipped without a Claude call. Roles with no posted salary are kept
# (most UK roles don't publish; matcher decides).
salary_floor_gbp: 40000

# Private sector — JobSpy aggregators (LinkedIn / Indeed / Glassdoor / Google).
queries:
  - term: "software engineer"
    location: "United Kingdom"
    country: uk

  # ML / research — MPhil DIS + neural-nets-from-scratch + symbolic regression research.
  - term: "machine learning engineer"
    location: "United Kingdom"
    country: uk

  - term: "research engineer"
    location: "United Kingdom"
    country: uk

  - term: "ai engineer"
    location: "United Kingdom"
    country: uk

  - term: "data scientist"
    location: "Remote, UK"
    country: uk

  # Quant — Cambridge physics → finance is the classic pipeline.
  - term: "quantitative researcher"
    location: "United Kingdom"
    country: uk

  - term: "quantitative developer"
    location: "United Kingdom"
    country: uk

  # Forward-deployed / deployment — matches current Seal role.
  - term: "forward deployed engineer"
    location: "United Kingdom"
    country: uk

  - term: "deployment engineer"
    location: "United Kingdom"
    country: uk

  # C++ / systems — DirectX 11 graphics engine + low-level work.
  - term: "c++ software engineer"
    location: "United Kingdom"
    country: uk

  - term: "graphics engineer"
    location: "Remote, UK"
    country: uk

