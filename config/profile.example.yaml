# Schema for config/profile.yaml. Copy to profile.yaml and fill in.
# Real profile.yaml is gitignored — in CI it comes from the PROFILE_B64 secret.
#
# To generate the secret value:
#   base64 -i config/profile.yaml | pbcopy      # macOS
#   base64 -w0 config/profile.yaml | xclip      # Linux
# Then paste into a repo secret named PROFILE_B64.
#
# These values are filled into application forms verbatim by the agent.
# Add or remove fields as needed — Claude picks the relevant ones per form.

